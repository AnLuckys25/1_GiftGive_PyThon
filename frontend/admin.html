<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GiftGive - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success py-3">
        <div class="container">
            <h2 class="text-white">GiftGive</h2>
            <h3 class="text-white">Love in Anywhere</h3>
            <div class="text-white"><strong>Welcome Admin comeback</strong></div>
        </div>
    </nav>

    <div class="bg-white border-bottom shadow-sm py-2 mb-4">
        <div class="container d-flex justify-content-center gap-4">
            <a href="admin.html" class="nav-link active">DashBoard</a>
            <a href="campaigns.html" class="nav-link">Chiến dịch</a>
            <a href="#" class="nav-link">Kho</a>
            <a href="#" class="nav-link">Người dùng</a>
            <a href="#" class="nav-link">Nhật ký</a>
        </div>
    </div>

    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3 d-flex flex-row justify-content-between align-items-center">
                    <div class="text-center w-50 border-end fw-bold"><small>Người Quyên góp</small><div class="fw-bold fs-4">0</div></div>
                    <div class="text-center w-50 fw-bold"><small>Người Nhận</small><div class="fw-bold fs-4">0</div></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 d-flex flex-row justify-content-between align-items-center">
                    <div class="text-center w-50 border-end fw-bold"><small>Sản phẩm Còn</small><div class="fw-bold fs-4" id="stock-count">0</div></div>
                    <div class="text-center w-50 fw-bold"><small> Sản phẩm Hết/Sắp hết</small><div class="fw-bold fs-4">0</div></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center d-flex flex-column justify-content-center fw-bold">
                    <small>Số chiến dịch</small><div class="fw-bold fs-4">0</div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="content-card p-3">
                    <h5>Biểu đồ Quỹ</h5>
                    <canvas id="myChart" class="mt-3"></canvas>
                </div>
            </div>
            <div class="col-md-8">
                <div class="content-card p-3">
                    <h5>Quản lý kho hàng</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="name" class="form-control" placeholder="Tên sản phẩm">
                        <input type="number" id="stock" class="form-control" placeholder="SL">
                        <button class="btn btn-success" onclick="addProduct()">Thêm</button>
                    </div>
                    <div class="table-wrapper">
                        <table class="table table-sm">
                            <thead><tr><th>ID</th><th>Tên</th><th>SL</th></tr></thead>
                            <tbody id="product-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadData() {
            try {
                const res = await fetch("/api/products");
                const result = await res.json();
                const body = document.getElementById("product-body");
                body.innerHTML = "";
                let total = 0;
                result.data.forEach(item => {
                    body.innerHTML += `<tr><td>${item.id}</td><td>${item.name}</td><td>${item.stock}</td></tr>`;
                    total += item.stock;
                });
                document.getElementById("stock-count").innerText = total;
            } catch (e) { console.error("Lỗi load dữ liệu"); }
        }

        async function addProduct() {
            const name = document.getElementById("name").value;
            const stock = document.getElementById("stock").value;
            await fetch("/api/products", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, stock: parseInt(stock) })
            });
            loadData();
        }

        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Hiện vật', 'Hiện kim'],
                datasets: [{ data: [60, 40], backgroundColor: ['#d19595', '#a5d6a7'] }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        loadData();
    </script>
</body>
</html>
