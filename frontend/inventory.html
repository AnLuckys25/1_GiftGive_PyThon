<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Kho - GiftGive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-success navbar-custom">
    <div class="container d-flex align-items-center">
        <div class="d-flex align-items-center"><img src="images/My_Logo.png" class="logo-img"> <h2 class="logo-brand m-0 ms-2">GiftGive</h2></div>
        <div class="slogan-center"><h3 class="m-0">Love in Anywhere</h3></div>
        <div class="admin-info text-white ms-auto"><strong>Welcome Admin comeback</strong></div>
    </div>
</nav>

<div class="wrapper">
    <nav class="sidebar p-3">
        <div class="nav flex-column gap-2">
            <a href="admin.html" class="nav-link"><i class="bi bi-columns-gap"></i> DashBoard</a>
            <a href="campaigns.html" class="nav-link"><i class="bi bi-megaphone"></i> Chiến dịch</a>
            <a href="inventory.html" class="nav-link active"><i class="bi bi-box-seam"></i> Kho</a>
            <a href="users.html" class="nav-link"><i class="bi bi-people"></i> Người dùng</a>
            <a href="logs.html" class="nav-link"><i class="bi bi-journal-bookmark"></i> Nhật ký</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0 fw-bold">Nhật ký Nhập/Xuất kho</h5>
                <button class="btn btn-success" onclick="loadInventory()">Tải lại</button>
            </div>
            
            <div class="mb-4">
                <input type="text" id="search" class="form-control shadow-sm" placeholder="🔍 Tìm kiếm sản phẩm..." onkeyup="filterTable()">
            </div>
                
            <div class="content-card table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr><th>Thời gian</th><th>Tên sản phẩm</th><th>Loại</th><th>Hành động</th><th>SL</th><th>Người thực hiện</th></tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>

   async function loadInventory() {
    const res = await fetch("/api/inventory-logs");
    const result = await res.json();
    const body = document.getElementById("inventory-body");
    body.innerHTML = "";

    result.data.forEach(log => {
        const row = document.createElement("tr");
        // Lưu trữ dữ liệu gốc vào dataset để không bị mất khi highlight
        row.innerHTML = `
            <td>${new Date(log.timestamp).toLocaleString("vi-VN")}</td>
            <td class="search-name">${log.product_name}</td>
            <td>${log.category}</td>
            <td>${log.action}</td>
            <td>${log.quantity}</td>
            <td>${log.user}</td>
        `;
        body.appendChild(row);
    });
}

function filterTable() {
    const filter = document.getElementById("search").value.toLowerCase();
    const rows = document.querySelectorAll("#inventory-body tr");

    rows.forEach(row => {
        const name = row.querySelector(".search-name").innerText.toLowerCase();
        if (name.includes(filter)) {
            row.style.display = "";
            // Highlight logic giữ lại văn bản gốc
            const cells = row.querySelectorAll("td");
            cells.forEach(cell => {
                const text = cell.innerText.replace(/<span class="highlight">|<\/span>/g, "");
                if (filter && text.toLowerCase().includes(filter)) {
                    const regex = new RegExp(`(${filter})`, 'gi');
                    cell.innerHTML = text.replace(regex, `<span class="highlight">$1</span>`);
                } else {
                    cell.innerHTML = text;
                }
            });
        } else {
            row.style.display = "none";
        }
    });
}
</script>
</body>
</html>
