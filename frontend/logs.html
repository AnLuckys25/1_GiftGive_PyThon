<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhật ký hệ thống - GiftGive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-success navbar-custom">
    <div class="container d-flex align-items-center">
        <div class="d-flex align-items-center"><img src="images/My_Logo.png" class="logo-img"> <h2 class="logo-brand m-0 ms-2">GiftGive</h2></div>
        <div class="slogan-center"><h3 class="m-0">Love in Anywhere</h3></div>
        <div class="admin-info text-white ms-auto"><strong>Welcome Admin comeback</strong></div>
    </div>
</nav>

<div class="wrapper">
    <nav class="sidebar p-3">
        <div class="nav flex-column gap-2">
            <a href="admin.html" class="nav-link"><i class="bi bi-columns-gap"></i> DashBoard</a>
            <a href="campaigns.html" class="nav-link"><i class="bi bi-megaphone"></i> Chiến dịch</a>
            <a href="inventory.html" class="nav-link"><i class="bi bi-box-seam"></i> Kho</a>
            <a href="users.html" class="nav-link"><i class="bi bi-people"></i> Người dùng</a>
            <a href="logs.html" class="nav-link active"><i class="bi bi-journal-bookmark"></i> Nhật ký</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="container-fluid">
            <div class="content-card">
                <h4 class="mb-3">Bảng Nhật ký Hoạt động Hệ thống</h4>
                <div class="row mb-3">
                    <div class="col-md-8">
                        <input type="text" id="logSearch" class="form-control" placeholder="🔍 Tìm kiếm nhật ký..." onkeyup="filterLogs()">
                    </div>
                    <div class="col-md-4 text-end">
                        <button class="btn btn-success" onclick="loadLogs()">Tải lại</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr><th>Thời gian</th><th>Hành động</th><th>Chi tiết</th><th>Trang</th><th>Người thực hiện</th></tr>
                        </thead>
                        <tbody id="log-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    async function loadLogs() {
    try {
        const res = await fetch("/api/logs");
        const result = await res.json();
        const body = document.getElementById("log-body");
        
        // Lưu trữ dữ liệu vào thuộc tính để dễ tìm kiếm
        body.innerHTML = result.data.map(log => `
            <tr class="log-row">
                <td>${log.timestamp}</td>
                <td>${log.action}</td>
                <td>${log.details}</td>
                <td>${log.page}</td>
                <td>${log.actor}</td>
            </tr>
        `).join("");
    } catch (e) { console.error("Lỗi tải log:", e); }
}

function filterLogs() {
    const filter = document.getElementById("logSearch").value.toLowerCase();
    const rows = document.querySelectorAll(".log-row");
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
}

loadLogs();
</script>
</body>
</html>
