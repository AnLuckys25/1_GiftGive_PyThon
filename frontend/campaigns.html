<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Chiến dịch - GiftGive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-success navbar-custom">
    <div class="container d-flex align-items-center">
        <div class="d-flex align-items-center"><img src="images/My_Logo.png" class="logo-img"> <h2 class="logo-brand m-0 ms-2">GiftGive</h2></div>
        <div class="slogan-center"><h3 class="m-0">Love in Anywhere</h3></div>
        <div class="admin-info text-white ms-auto"><strong>Welcome Admin comeback</strong></div>
    </div>
</nav>

<div class="wrapper">
    <nav class="sidebar p-3">
        <div class="nav flex-column gap-2">
            <a href="admin.html" class="nav-link"><i class="bi bi-columns-gap"></i> DashBoard</a>
            <a href="campaigns.html" class="nav-link active"><i class="bi bi-megaphone"></i> Chiến dịch</a>
            <a href="inventory.html" class="nav-link"><i class="bi bi-box-seam"></i> Kho</a>
            <a href="users.html" class="nav-link"><i class="bi bi-people"></i> Người dùng</a>
            <a href="logs.html" class="nav-link"><i class="bi bi-journal-bookmark"></i> Nhật ký</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Quản lý Chiến dịch</h3>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addCampaignModal">+ Thêm chiến dịch</button>
            </div>

            <div class="content-card">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr><th>ID</th><th>Tên chiến dịch</th><th>Trạng thái</th><th>Tiến độ</th><th>Hành động</th></tr>
                    </thead>
                    <tbody id="campaign-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

    <div class="modal fade" id="addCampaignModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Thêm mới chiến dịch</h5></div>
                <div class="modal-body">
                    <input type="text" id="camp-title" class="form-control mb-2" placeholder="Tên chiến dịch">
                    <input type="number" id="camp-goal" class="form-control" placeholder="Mục tiêu gây quỹ (VNĐ)">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="addCampaign()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    

    <script>
// 1. Hàm tải danh sách chiến dịch
async function loadCampaigns() {
    try {
        const res = await fetch("/api/campaigns");
        const result = await res.json();
        const body = document.getElementById("campaign-body");
        body.innerHTML = "";
        
        result.data.forEach(c => {
            // Xử lý an toàn: Nếu current hoặc goal không tồn tại thì gán = 0
            const current = c.current_amount || 0;
            const goal = c.goal_amount || 0;
            
            const progress = (goal > 0) 
                ? ((current / goal) * 100).toFixed(0) 
                : 0;

           body.innerHTML += `<tr>
              <td>${c.campaign_id}</td>
             <td>${c.title}</td>
             <td><span class="badge bg-info">${c.status || 'Đang chạy'}</span></td>
              <td>${progress}%</td>
               <td>
                 <button class="btn btn-sm btn-danger" onclick="closeCampaign(${c.campaign_id})">Đóng</button>
                 <button class="btn btn-sm btn-outline-danger" onclick="deleteCampaign(${c.campaign_id})">Xóa</button>
               </td>
            </tr>`;
        });
    } catch (e) { console.error("Lỗi tải danh sách:", e); }
}

// 2. Hàm thêm mới (Nút Lưu trong Modal)
async function addCampaign() {
    const title = document.getElementById("camp-title").value;
    const goal = document.getElementById("camp-goal").value;

    if (!title || !goal) {
        alert("Vui lòng nhập đầy đủ tên và mục tiêu!");
        return;
    }

    try {
        const response = await fetch("/api/campaigns", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: title, goal_amount: parseInt(goal) })
        });

        if (response.ok) {
            alert("Thêm chiến dịch thành công!");
            // Đóng Modal bằng Bootstrap
            const modalEl = document.getElementById('addCampaignModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
            
            loadCampaigns(); // Tải lại bảng ngay lập tức
            document.getElementById("camp-title").value = "";
            document.getElementById("camp-goal").value = "";
        }
    } catch (error) { console.error("Lỗi thêm mới:", error); }
}

// 3. Hàm đóng chiến dịch
async function closeCampaign(id) {
    if(confirm("Bạn có chắc chắn muốn đóng chiến dịch này?")) {
        try {
            const res = await fetch(`/api/campaigns/${id}/close`, { 
                method: "POST", // Phải khớp với route @app.post ở backend
                headers: { "Content-Type": "application/json" }
            });
            
            const result = await res.json();
            
            if(res.ok) {
                alert("Đã đóng chiến dịch thành công!");
                loadCampaigns(); // Tải lại bảng để cập nhật giao diện
            } else {
                alert("Lỗi: " + (result.detail || "Không thể đóng chiến dịch"));
            }
        } catch (error) { 
            console.error("Lỗi đóng chiến dịch:", error); 
        }
    }
}

// Hàm xóa chiến dịch
async function deleteCampaign(id) {
    if(confirm("Bạn có chắc chắn muốn xóa vĩnh viễn chiến dịch này?")) {
        try {
            const res = await fetch(`/api/campaigns/${id}`, { method: "DELETE" });
            if(res.ok) {
                alert("Đã xóa!");
                loadCampaigns();
            }
        } catch (e) { console.error("Lỗi xóa:", e); }
    }
}

// Hàm cập nhật (Bạn có thể tạo một Modal khác hoặc dùng prompt đơn giản)
async function updateCampaign(id, newTitle, newGoal) {
    try {
        await fetch(`/api/campaigns/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTitle, goal_amount: parseInt(newGoal) })
        });
        loadCampaigns();
    } catch (e) { console.error("Lỗi cập nhật:", e); }
}

// Gọi hàm load khi trang vừa mở
loadCampaigns();
</script>

</body>
</html>
