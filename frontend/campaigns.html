<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Chiến dịch - GiftGive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success py-3">
        <div class="container">
            <h2 class="text-white">GiftGive</h2>
            <h3 class="text-white">Love in Anywhere</h3>
            <div class="text-white"><strong>Welcome Admin comeback</strong></div>
        </div>
    </nav>

    <div class="bg-white border-bottom shadow-sm py-2 mb-4">
        <div class="container d-flex justify-content-center gap-4">
            <a href="admin.html" class="nav-link">DashBoard</a>
            <a href="campaigns.html" class="nav-link active">Chiến dịch</a>
            <a href="#" class="nav-link">Kho</a>
            <a href="#" class="nav-link">Người dùng</a>
            <a href="#" class="nav-link">Nhật ký</a>
        </div>
    </div>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Quản lý Chiến dịch</h3>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addCampaignModal">+ Thêm chiến dịch</button>
        </div>

        <div class="content-card p-4">
            <div class="table-wrapper" style="height: 380px; overflow-y: auto;">
                <table class="table table-hover table-sm">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th><th>Tên chiến dịch</th><th>Trạng thái</th><th>Tiến độ</th><th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="campaign-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addCampaignModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Thêm mới chiến dịch</h5></div>
                <div class="modal-body">
                    <input type="text" id="camp-title" class="form-control mb-2" placeholder="Tên chiến dịch">
                    <input type="number" id="camp-goal" class="form-control" placeholder="Mục tiêu gây quỹ (VNĐ)">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="addCampaign()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
       async function loadCampaigns() {
    try {
        const res = await fetch("/api/campaigns");
        const result = await res.json();
        const body = document.getElementById("campaign-body");
        body.innerHTML = "";
        
        result.data.forEach(c => {
            // Kiểm tra nếu goal_amount bằng 0 hoặc không có dữ liệu thì mặc định là 0%
            const progress = (c.goal_amount > 0) 
                ? ((c.current_amount / c.goal_amount) * 100).toFixed(0) 
                : 0;

            body.innerHTML += `<tr>
                <td>${c.campaign_id}</td>
                <td>${c.title}</td>
                <td><span class="badge bg-info">${c.status}</span></td>
                <td>${progress}%</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="closeCampaign(${c.campaign_id})">
                        Đóng
                    </button>
                </td>
            </tr>`;
        });
    } catch (e) { console.error("Lỗi tải chiến dịch"); }
}

// Thêm hàm xử lý đóng chiến dịch
async function closeCampaign(id) {
    if(confirm("Bạn có chắc chắn muốn đóng chiến dịch này?")) {
        await fetch(`/api/campaigns/${id}/close`, { method: "POST" });
        loadCampaigns(); // Tải lại bảng sau khi đóng
    }
}
    </script>
</body>
</html>
